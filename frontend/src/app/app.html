<main class="mx-auto max-w-4xl px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900">Evaluación de crédito</h1>

    <section class="mt-6 grid grid-cols-1 gap-8 md:grid-cols-2">
        <app-credit-form [loading]="loading()" (evaluate)="onEvaluate($event)" />
        <app-credit-result [result]="result()" [error]="error()" />
    </section>

    <section class="mt-10">
        <h2 class="text-lg font-semibold text-gray-900">Evaluaciones realizadas</h2>
        <div class="mt-3">
            <app-credit-list [evaluations]="evaluations()" />
        </div>
    </section>
</main>
