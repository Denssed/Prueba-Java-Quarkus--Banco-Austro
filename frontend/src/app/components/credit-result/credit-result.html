@if (error()) {
    <p class="text-sm text-red-600">{{ error() }}</p>
} @else if (result()) {
    <div class="rounded-md border border-gray-200 p-4">
        <span
            class="inline-block rounded-full px-3 py-1 text-sm font-semibold text-white"
            [class.bg-green-600]="result()!.aprobado"
            [class.bg-red-600]="!result()!.aprobado"
        >
            {{ result()!.aprobado ? 'Aprobado' : 'Rechazado' }}
        </span>
        <ul class="mt-3 list-inside list-disc text-sm text-gray-700">
            <li>Score: {{ result()!.score }}</li>
            <li>Cuota: {{ result()!.cuota }}</li>
            <li>Deuda mensual total: {{ result()!.deudaMensualTotal }}</li>
        </ul>
    </div>
}
