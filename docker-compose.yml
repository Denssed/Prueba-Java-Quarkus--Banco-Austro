services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: bda
      POSTGRES_PASSWORD: bda
      POSTGRES_DB: bda_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bda -d bda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
