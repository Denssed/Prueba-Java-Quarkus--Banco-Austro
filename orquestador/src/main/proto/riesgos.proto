syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.bda.riesgos";
option java_outer_classname = "RiesgosProto";

package riesgos;

service RiesgosService {
    rpc GetScore (CedulaRequest) returns (ScoreResponse) {}
    rpc GetDeudas (CedulaRequest) returns (DeudasResponse) {}
}

message CedulaRequest {
    string cedula = 1;
}

message ScoreResponse {
    int32 score = 1;
}

message Deuda {
    string entidad = 1;
    double mensualidad = 2;
}

message DeudasResponse {
    repeated Deuda deudas = 1;
}
